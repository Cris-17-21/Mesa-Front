<p-dialog [header]="dataToEdit() ? 'Editar Sucursal' : 'Nueva Sucursal'" [visible]="visible()"
    (visibleChange)="visible.set($event)" [modal]="true" [draggable]="false"
    [style]="{ width: '30rem', maxWidth: '95vw' }" [contentStyle]="{'max-height': '80vh', 'overflow-y': 'auto'}"
    (onHide)="close()">

    @if (visible()) {
    <form [formGroup]="sucursalForm" (ngSubmit)="save()" class="form-noir mt-2">

        <div class="field-noir">
            <label class="label-noir">Empresa*</label>
            <p-select [options]="empresasList()" formControlName="empresa" optionLabel="razonSocial" optionValue="id"
                placeholder="Seleccione Empresa" [filter]="true" class="w-full">
            </p-select>
            @if (isInvalid('empresa')) {
            <small class="error-text">{{ getErrorMessage('empresa') }}</small>
            }
        </div>

        <div class="field-noir">
            <label class="label-noir">Nombre de Sede*</label>
            <input pInputText formControlName="nombre" placeholder="Ej. Principal" class="noir-input"
                [class.invalid]="isInvalid('nombre')" />
            @if (isInvalid('nombre')) {
            <small class="error-text">{{ getErrorMessage('nombre') }}</small>
            }
        </div>

        <div class="field-noir">
            <label class="label-noir">Dirección<span class="optional">(Opcional)</span></label>
            <input pInputText formControlName="direccion" placeholder="Calle Ejemplo 123" class="noir-input"
                [class.invalid]="isInvalid('direccion')" />
            @if (isInvalid('direccion')) {
            <small class="error-text">{{ getErrorMessage('direccion') }}</small>
            }
        </div>

        <div class="field-noir">
            <label class="label-noir">Teléfono<span class="optional">(Opcional)</span></label>
            <input pInputText formControlName="telefono" placeholder="987654321" maxlength="9" class="noir-input"
                [class.invalid]="isInvalid('telefono')" />
            @if (isInvalid('telefono')) {
            <small class="error-text">{{ getErrorMessage('telefono') }}</small>
            }
        </div>

        <div class="footer-actions mt-4">
            <button type="button" class="btn-cancel" (click)="close()" [disabled]="loading()">Cancelar</button>
            <button type="submit" class="btn-save" [disabled]="loading()">
                @if (!loading()) {
                <i class="bi bi-check2-circle mr-2"></i>
                }
                {{ loading() ? 'Procesando...' : (dataToEdit() ? 'Actualizar' : 'Registrar') }}
            </button>
        </div>
    </form>
    }
</p-dialog>
